name: Export web comments to comments.json

# Auto-runs when issues change; writes to 'data' branch (not main — avoids redeployment)
on:
  workflow_dispatch:
  issues:
    types: [opened, edited, deleted, closed, reopened]

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      contents: write

    steps:
      - name: Checkout data branch (create if needed)
        uses: actions/checkout@v4
        with:
          ref: data
          fetch-depth: 0
        continue-on-error: true

      - name: Init data branch if it does not exist
        run: |
          if ! git rev-parse --verify origin/data >/dev/null 2>&1; then
            git checkout --orphan data
            git rm -rf . 2>/dev/null || true
            echo "[]" > comments.json
            git add comments.json
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "init: data branch for comments"
            git push origin data
          fi

      - name: Fetch all web-comment issues and write comments.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            "repos/${{ github.repository }}/issues?state=open&per_page=100" \
            --jq '[.[] | select(.title | startswith("[PRD]") or startswith("[PROTOTYPE]")) | {
              id: .number,
              title: .title,
              page: (if (.title | startswith("[PRD]")) then "prd" else "prototype" end),
              author: .user.login,
              created_at: .created_at,
              body: .body,
              html_url: .html_url
            }]' > comments.json

      - name: Commit and push to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add comments.json
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: sync comments.json [$(date -u +%Y-%m-%d)]"
          for attempt in 1 2 3; do
            git pull --rebase origin data
            if git push origin HEAD:data; then
              exit 0
            fi
            echo "Push failed, retrying ($attempt/3)"
            sleep 2
          done
          echo "Could not push comments.json after retries"
          exit 1
