<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Menu Tower</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { min-height: 100vh; margin: 0; padding: max(14px, env(safe-area-inset-top)) 12px 18px; background: var(--ink); color: var(--ui-text); font-family: var(--body-font); display: grid; place-items: center; touch-action: none; }
    .shell { width: min(var(--game-width), 100%); position: relative; }
    .masthead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
    .masthead img { width: 108px; height: 32px; object-fit: contain; filter: brightness(0) invert(1); }
    .masthead span { color: var(--cream); font-size: 10px; font-weight: 800; letter-spacing: .12em; }
    .headline { display: flex; justify-content: space-between; align-items: end; margin-bottom: 10px; }
    .eyebrow { color: var(--cream); margin: 0 0 4px; font-size: 10px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
    h1 { margin: 0; color: var(--paper); font-family: var(--headline-font); font-size: clamp(38px, 10vw, 56px); line-height: .86; letter-spacing: 0; }
    .hud { min-width: 148px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 9px; padding: 7px 10px; border: 1px solid var(--line); border-radius: var(--radius); text-align: right; }
    .hud b { display: block; color: var(--cream); font-size: 25px; line-height: .86; } .hud span { color: var(--ui-text); font-size: 9px; font-weight: 800; letter-spacing: .09em; text-transform: uppercase; }
    .playfield { position: relative; border: 3px solid var(--paper); border-radius: var(--radius); overflow: hidden; box-shadow: 0 13px 29px var(--shadow); background: var(--sky); }
    .playfield::after { content: ''; pointer-events: none; position: absolute; inset: 0; z-index: 1; border: 1px solid rgba(255,255,255,.36); border-radius: calc(var(--radius) - 2px); box-shadow: inset 0 1px 0 rgba(255,255,255,.4), inset 0 -36px 55px rgba(0,0,0,.12); }
    canvas { display: block; width: 100%; aspect-ratio: 400 / 620; }
    .overlay { position: absolute; inset: 0; z-index: 3; display: grid; place-items: center; padding: 24px; text-align: center; background: rgba(33,37,41,.73); }
    .overlay.hidden { display: none; }
    .overlay-card { max-width: 310px; }
    .overlay .eyebrow { color: var(--cream); margin-bottom: 9px; }
    .overlay h2 { margin: 0 0 13px; color: var(--paper); font-family: var(--headline-font); font-size: 46px; line-height: .9; }
    .overlay p { color: var(--paper); margin: 0 0 22px; line-height: 1.4; }
    .primary { border: 0; border-radius: var(--radius); padding: 13px 18px; background: var(--brand); color: #fff; font-weight: 800; box-shadow: 0 6px 0 var(--brand-dark); cursor: pointer; }
    .primary:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--brand-dark); }
    .footer { display: flex; justify-content: space-between; margin-top: 10px; color: var(--paper); font-size: 12px; }
    .footer b { color: var(--cream); }
    .controls { width: 164px; margin: 15px auto 0; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .control { height: 49px; border: 1px solid var(--line); border-radius: var(--radius); background: rgba(255,255,255,.1); color: var(--ui-text); font-size: 23px; cursor: pointer; }
    .control:active, .control.active { background: var(--brand); transform: scale(.96); }
    @media (min-width: 700px) { .controls { display: none; } }
  </style>
</head>
<body>
  <main class="shell">
    <header class="masthead"><img id="logo" alt="Vapiano"><span>ONE MORE PLATE</span></header>
    <div class="headline"><div><p class="eyebrow" id="eyebrow"></p><h1 id="title"></h1></div><div class="hud"><div><b id="score">0</b><span id="scoreLabel"></span></div><div><b id="height">0</b><span id="heightLabel"></span></div></div></div>
    <div class="playfield" id="playfield"><canvas id="canvas" aria-label="Menu Tower game board"></canvas><section class="overlay" id="overlay" role="dialog" aria-modal="true"><div class="overlay-card"><p class="eyebrow" id="overlayEyebrow"></p><h2 id="overlayTitle"></h2><p id="overlayMessage"></p><button class="primary" id="playButton"></button></div></section></div>
    <footer class="footer"><span><span id="bestLabel"></span>: <b id="best">0</b></span><span>Arrow keys or buttons</span></footer>
    <div class="controls" aria-label="Movement controls"><button class="control" data-control="left" aria-label="Move left">←</button><button class="control" data-control="right" aria-label="Move right">→</button></div>
  </main>
  <script src="../shared/theme-runtime.js"></script>
  <script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d'), $ = id => document.getElementById(id);
    const send = message => window.parent.postMessage(message, '*');
    let theme, images = [], chefImage, backgroundImage, scale = 1, player, platforms, running = false, frame, pressed = { left: false, right: false }, height = 0, score = 0, highestY = 0, lastLandingPlatform = null;
    let best = Number(localStorage.getItem('vapiano-menu-tower-best') || 0);
    const css = name => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
    const random = (min, max) => min + Math.random() * (max - min);
    const image = src => new Promise(resolve => { const img = new Image(); img.onload = () => resolve(img); img.onerror = () => resolve(null); img.src = src; });

    async function writeCopy() {
      const { content, assets, gameplay } = theme;
      $('logo').src = assets.logo; $('eyebrow').textContent = content.eyebrow; $('title').textContent = content.title; $('scoreLabel').textContent = content.scoreLabel; $('heightLabel').textContent = content.heightLabel; $('bestLabel').textContent = content.bestLabel; $('best').textContent = best;
      $('overlayEyebrow').textContent = content.eyebrow; $('overlayTitle').textContent = content.title; $('overlayMessage').textContent = content.intro; $('playButton').textContent = content.startLabel;
      canvas.width = gameplay.canvasWidth; canvas.height = gameplay.canvasHeight; scale = $('playfield').clientWidth / canvas.width;
      images = await Promise.all(assets.platformImages.map(image)); chefImage = await image(assets.chefImage); backgroundImage = await image(assets.backgroundImage); reset(); draw();
    }
    function newPlatform(y, previous) {
      const g = theme.gameplay, width = random(g.platformMinWidth, g.platformMaxWidth); const target = previous ? previous.x + random(-116, 116) : (g.canvasWidth - width) / 2;
      return { x: clamp(target, 8, g.canvasWidth - width - 8), y, width, image: images[Math.floor(Math.random() * images.length)] };
    }
    function updateScore() { $('score').textContent = `${Math.min(score, theme.gameplay.scoreTarget)}/${theme.gameplay.scoreTarget}`; }
    function reset() {
      const g = theme.gameplay; height = 0; score = 0; lastLandingPlatform = null; highestY = g.canvasHeight - 80; $('height').textContent = height; updateScore();
      const start = { x: 105, y: g.canvasHeight - 45, width: 190, image: images[0] }; platforms = [start]; let last = start;
      for (let y = start.y - g.platformGapMin; y > -120; y -= random(g.platformGapMin, g.platformGapMax)) { last = newPlatform(y, last); platforms.push(last); }
      player = { x: g.canvasWidth / 2 - 19, y: start.y - 45, w: 38, h: 43, vx: 0, vy: g.jumpVelocity, airJumps: g.airJumps };
    }
    function begin() { reset(); running = true; $('overlay').classList.add('hidden'); cancelAnimationFrame(frame); send({ type: 'GAME_STARTED', timestamp: Date.now() }); loop(); }
    function loop() { if (!running) return; update(); draw(); frame = requestAnimationFrame(loop); }
    function update() {
      const g = theme.gameplay; const direction = (pressed.right ? 1 : 0) - (pressed.left ? 1 : 0); player.vx += (direction * g.moveSpeed - player.vx) * .24; player.x += player.vx; if (player.x > g.canvasWidth) player.x = -player.w; if (player.x + player.w < 0) player.x = g.canvasWidth; const previousBottom = player.y + player.h; player.vy += g.gravity; player.y += player.vy;
      if (player.vy > 0) for (const platform of platforms) if (previousBottom <= platform.y && player.y + player.h >= platform.y && player.x + player.w > platform.x && player.x < platform.x + platform.width) { player.y = platform.y - player.h; player.vy = g.jumpVelocity; player.airJumps = g.airJumps; highestY = Math.min(highestY, platform.y); if (platform !== lastLandingPlatform) { lastLandingPlatform = platform; score += g.scorePerLanding; updateScore(); send({ type: 'SCORE_UPDATE', score, timestamp: Date.now() }); if (score >= g.scoreTarget) return finish('win'); } break; }
      if (player.y < g.scrollTriggerY) { const shift = g.scrollTriggerY - player.y; player.y = g.scrollTriggerY; platforms.forEach(platform => platform.y += shift); const climbed = Math.floor(shift / 10); if (climbed) { height += climbed; $('height').textContent = height; send({ type: 'SCORE_UPDATE', score: height, timestamp: Date.now() }); } }
      const topMost = Math.min(...platforms.map(platform => platform.y)); if (topMost > -g.platformGapMax) { const top = platforms.find(platform => platform.y === topMost); platforms.push(newPlatform(topMost - random(g.platformGapMin, g.platformGapMax), top)); }
      platforms = platforms.filter(platform => platform.y < g.canvasHeight + 70); if (player.y > g.canvasHeight + 45) finish();
    }
    function finish(reason = 'fell') { running = false; cancelAnimationFrame(frame); best = Math.max(best, score); localStorage.setItem('vapiano-menu-tower-best', best); $('best').textContent = best; const won = reason === 'win'; $('overlayTitle').textContent = won ? theme.content.winTitle : theme.content.overTitle; $('overlayMessage').textContent = won ? theme.content.winMessage.replace('{target}', theme.gameplay.scoreTarget).replace('{height}', height) : theme.content.overMessage.replace('{score}', score).replace('{height}', height); $('playButton').textContent = theme.content.restartLabel; $('overlay').classList.remove('hidden'); send({ type: 'GAME_OVER', finalScore: score, reason: won ? 'win' : 'fell', timestamp: Date.now() }); }
    function roundedPath(x, y, width, height, radius) { ctx.beginPath(); ctx.roundRect(x, y, width, height, radius); }
    function drawPlatform(platform) { ctx.save(); roundedPath(platform.x, platform.y, platform.width, theme.gameplay.platformHeight, 7); ctx.clip(); if (platform.image) ctx.drawImage(platform.image, platform.x, platform.y, platform.width, theme.gameplay.platformHeight); else { ctx.fillStyle = css('--paper'); ctx.fillRect(platform.x, platform.y, platform.width, theme.gameplay.platformHeight); } ctx.fillStyle = 'rgba(33,37,41,.22)'; ctx.fillRect(platform.x, platform.y + theme.gameplay.platformHeight * .53, platform.width, theme.gameplay.platformHeight); ctx.restore(); ctx.strokeStyle = css('--paper'); ctx.lineWidth = 2; roundedPath(platform.x, platform.y, platform.width, theme.gameplay.platformHeight, 7); ctx.stroke(); }
    function drawPlayer() { const cx = player.x + player.w / 2, cy = player.y + player.h / 2; ctx.fillStyle = css('--brand'); ctx.beginPath(); ctx.arc(cx, cy, player.w * .49, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = css('--paper'); ctx.font = `800 ${player.w * .48}px Georgia`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('V', cx, cy + 1); if (chefImage) { ctx.save(); ctx.globalAlpha = .55; ctx.beginPath(); ctx.arc(cx, cy, player.w * .44, 0, Math.PI * 2); ctx.clip(); ctx.drawImage(chefImage, 165, 18, 560, 740, player.x, player.y, player.w, player.h); ctx.restore(); } ctx.strokeStyle = css('--paper'); ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx, cy, player.w * .49, 0, Math.PI * 2); ctx.stroke(); }
    function drawBackdrop() { if (!backgroundImage) return; const g = theme.gameplay; const imageScale = Math.max(g.canvasWidth / backgroundImage.width, g.canvasHeight / backgroundImage.height); const width = backgroundImage.width * imageScale, imageHeight = backgroundImage.height * imageScale; const x = (g.canvasWidth - width) / 2; const y = (g.canvasHeight - imageHeight) / 2; ctx.save(); ctx.globalAlpha = Number(css('--backdrop-opacity')) || .88; ctx.filter = `blur(${css('--backdrop-blur') || '8px'})`; ctx.drawImage(backgroundImage, x - 20, y - 20, width + 40, imageHeight + 40); ctx.restore(); }
    function draw() { if (!theme) return; const g = theme.gameplay; ctx.fillStyle = css('--sky-deep'); ctx.fillRect(0, 0, g.canvasWidth, g.canvasHeight); drawBackdrop(); ctx.save(); ctx.globalAlpha = Number(css('--glass-tint-opacity')) || .28; ctx.fillStyle = css('--glass-tint'); ctx.fillRect(0, 0, g.canvasWidth, g.canvasHeight); ctx.restore(); platforms.forEach(drawPlatform); drawPlayer(); }
    function setControl(control, active) { pressed[control] = active; document.querySelector(`[data-control="${control}"]`)?.classList.toggle('active', active); }
    function tryAirJump() { if (!running || player.airJumps <= 0) return; player.vy = theme.gameplay.jumpVelocity * .9; player.airJumps--; }
    document.addEventListener('keydown', event => { if (event.key === 'ArrowLeft' || event.key.toLowerCase() === 'a') { event.preventDefault(); setControl('left', true); } if (event.key === 'ArrowRight' || event.key.toLowerCase() === 'd') { event.preventDefault(); setControl('right', true); } if (event.code === 'Space' && !event.repeat) { event.preventDefault(); tryAirJump(); } });
    document.addEventListener('keyup', event => { if (event.key === 'ArrowLeft' || event.key.toLowerCase() === 'a') setControl('left', false); if (event.key === 'ArrowRight' || event.key.toLowerCase() === 'd') setControl('right', false); });
    document.querySelectorAll('[data-control]').forEach(button => { const control = button.dataset.control; button.addEventListener('pointerdown', event => { event.preventDefault(); setControl(control, true); }); ['pointerup','pointercancel','pointerleave'].forEach(type => button.addEventListener(type, () => setControl(control, false))); });
    canvas.addEventListener('pointerdown', event => { event.preventDefault(); tryAirJump(); });
    $('playButton').addEventListener('click', begin); window.addEventListener('message', event => { if (event.data?.type === 'PAUSE') running = false; if (event.data?.type === 'RESUME' && $('overlay').classList.contains('hidden') && !running) { running = true; loop(); } });
    GameTheme.loadTheme('theme.json').then(data => { theme = data; writeCopy().then(() => send({ type: 'GAME_READY' })); }).catch(error => { $('overlayMessage').textContent = error.message; });
  </script>
</body>
</html>
